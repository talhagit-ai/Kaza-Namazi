<!DOCTYPE html>
<html lang="tr" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E1714">
<title>Kaza Namazı Takibi</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kaza Takibi">
<meta name="application-name" content="Kaza Takibi">
<link rel="apple-touch-icon" id="appleIcon">
<link rel="icon" type="image/png" id="favIcon">
<link rel="manifest" id="manifestLink">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E1714;--surface:#16221E;--surface-2:#1C2A25;
    --line:rgba(242,237,228,.10);--line-soft:rgba(242,237,228,.06);
    --text:#F2EDE4;--muted:#93A39B;--muted-2:#6E7E76;
    --gold:#D4B068;--gold-2:#E7C883;--danger:#C8694E;--ok:#7FB08A;--r:18px;
    --serif:'Fraunces',Georgia,serif;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --arabic:'Noto Naskh Arabic','Geeza Pro',serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  html[dir="rtl"] body{font-family:var(--arabic)}
  html[dir="rtl"] h1,html[dir="rtl"] .sheet h2,html[dir="rtl"] .names .tr{font-family:var(--arabic)}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;
    background-image:radial-gradient(120% 80% at 50% -20%,rgba(212,176,104,.12),transparent 60%),radial-gradient(90% 60% at 80% 8%,rgba(124,143,201,.07),transparent 55%);
    background-attachment:fixed;
    padding:calc(env(safe-area-inset-top) + 18px) calc(env(safe-area-inset-right) + 16px) calc(env(safe-area-inset-bottom) + 40px) calc(env(safe-area-inset-left) + 16px);}
  .wrap{max-width:560px;margin:0 auto}
  .topbar{display:flex;justify-content:flex-end;margin-bottom:12px}
  .langwrap{position:relative}
  .langwrap::after{content:"▾";position:absolute;inset-inline-end:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}
  .langwrap select{appearance:none;-webkit-appearance:none;font-family:var(--sans);font-weight:600;font-size:13px;color:var(--text);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding-block:8px;padding-inline-start:12px;padding-inline-end:30px;cursor:pointer}
  .langwrap select:focus{outline:2px solid var(--gold);outline-offset:1px}
  .eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin:0 0 8px}
  h1{font-family:var(--serif);font-weight:500;font-size:30px;line-height:1.12;letter-spacing:-.01em;margin:0 0 6px}
  .lead{color:var(--muted);font-size:14.5px;margin:0 0 16px;max-width:44ch}
  .yearbar{display:flex;align-items:center;justify-content:space-between;gap:14px;background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:18px}
  .yb-label{font-size:14px;font-weight:600;color:var(--text)}
  .yb-sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;max-width:32ch}
  .yb-select{position:relative;flex:none}
  .yb-select::after{content:"▾";position:absolute;inset-inline-end:13px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:12px;pointer-events:none}
  .yb-select select{appearance:none;-webkit-appearance:none;font-family:var(--sans);font-weight:700;font-size:15px;color:var(--text);background:rgba(212,176,104,.12);border:1px solid rgba(212,176,104,.4);border-radius:11px;padding-block:11px;padding-inline-start:14px;padding-inline-end:36px;min-width:96px;cursor:pointer}
  .yb-select select:focus{outline:2px solid var(--gold);outline-offset:1px}
  .installbtn{width:100%;border:0;background:linear-gradient(180deg,var(--gold-2),var(--gold));color:#1a140a;font-family:var(--sans);font-weight:700;font-size:15px;padding:14px;border-radius:14px;cursor:pointer;margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:10px}
  .installbtn:active{filter:brightness(.96)}
  .installbtn svg{width:18px;height:18px}
  .installbtn .ib-k{font-weight:500;font-size:12.5px;color:rgba(26,20,10,.7)}
  .installbtn[hidden]{display:none}
  .steps{margin:4px 0;padding-inline-start:20px;color:var(--text);font-size:14.5px;line-height:1.7}
  .steps b{font-weight:600}
  .steps li{margin-bottom:7px}
  .hero{background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--line);border-radius:22px;padding:18px 20px 20px;margin-bottom:18px;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(80% 120% at 50% -30%,rgba(212,176,104,.16),transparent 60%);pointer-events:none}
  .savebar{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--line-soft);padding:5px 11px;border-radius:99px;margin-bottom:14px}
  .savebar i{width:7px;height:7px;border-radius:50%;background:var(--muted-2);flex:none}
  .savebar.saving i{background:var(--gold);animation:pulse 1s infinite}
  .savebar.saved i{background:var(--ok)}.savebar.saved{color:var(--ok)}
  .savebar.warn i{background:var(--danger)}.savebar.warn{color:var(--danger)}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  .hero-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px}
  .hero-label{font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);font-weight:600}
  .pct{font-family:var(--serif);font-size:18px;color:var(--gold-2)}
  .remain{display:flex;align-items:baseline;gap:10px;margin:6px 0 2px}
  .remain .big{font-family:var(--serif);font-weight:500;font-size:52px;line-height:1;letter-spacing:-.02em}
  .remain .unit{color:var(--muted);font-size:15px;font-weight:500}
  .sub{color:var(--muted);font-size:13px;margin:2px 0 16px}
  .sub b{color:var(--text);font-weight:600}
  .meter{height:8px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden}
  .meter>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-2));width:0;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .pace{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid var(--line-soft);font-size:13px;color:var(--muted)}
  .pace .seg{display:inline-flex;background:rgba(255,255,255,.05);border-radius:10px;padding:3px;gap:2px}
  .pace .seg button{border:0;background:transparent;color:var(--muted);font-family:var(--sans);font-size:12.5px;font-weight:600;padding:5px 9px;border-radius:7px;cursor:pointer;min-width:30px}
  .pace .seg button[aria-pressed="true"]{background:var(--gold);color:#1a140a}
  .pace .eta{color:var(--text)}
  .daybtn{width:100%;border:1px solid rgba(212,176,104,.45);background:linear-gradient(180deg,rgba(212,176,104,.18),rgba(212,176,104,.08));color:var(--gold-2);font-family:var(--sans);font-weight:600;font-size:15.5px;padding:15px;border-radius:16px;cursor:pointer;margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:10px}
  .daybtn:active{filter:brightness(1.08)}
  .daybtn .k{font-size:13px;color:var(--muted);font-weight:500}
  .daybtn:disabled{opacity:.45;cursor:default}
  .seclabel{display:flex;align-items:center;gap:12px;margin:0 2px 12px;color:var(--muted-2);font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:600}
  .seclabel::after{content:"";flex:1;height:1px;background:var(--line)}
  .cards{display:flex;flex-direction:column;gap:12px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 14px;position:relative;--a:var(--gold)}
  .card.done{border-color:rgba(212,176,104,.5);border-color:color-mix(in srgb,var(--a) 55%,transparent)}
  .card-head{display:flex;align-items:center;gap:12px;margin-bottom:13px}
  .dot{width:13px;height:13px;border-radius:50%;flex:none;background:var(--a);background:radial-gradient(circle at 35% 30%,color-mix(in srgb,var(--a) 92%,#fff),var(--a));box-shadow:0 0 0 4px color-mix(in srgb,var(--a) 16%,transparent)}
  .names{flex:1;min-width:0}
  .names .tr{font-family:var(--serif);font-size:19px;font-weight:500;line-height:1;display:inline}
  .badge{font-family:var(--sans);font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.06);border:1px solid var(--line-soft);padding:2px 7px;border-radius:99px;margin-inline-start:7px;position:relative;top:-1px}
  .names .ar{font-family:var(--arabic);font-size:15px;color:var(--muted);direction:rtl;line-height:1;margin-top:4px}
  .count{text-align:end;flex:none}
  .count .now{font-size:20px;font-weight:700;letter-spacing:-.01em}
  .count .of{color:var(--muted-2);font-size:13px}
  .card .meter{height:6px;margin-bottom:13px}
  .card .meter>i{background:var(--a);background:linear-gradient(90deg,color-mix(in srgb,var(--a) 80%,#000),var(--a))}
  .row{display:flex;align-items:center;gap:8px}
  .left-note{font-size:12.5px;color:var(--muted);flex:1}
  .left-note b{color:var(--text);font-weight:600}
  .left-note.complete{color:var(--ok);font-weight:600}
  .btn{border:1px solid var(--line);background:var(--surface-2);color:var(--text);font-family:var(--sans);font-weight:600;border-radius:11px;cursor:pointer;height:42px;min-width:42px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
  .btn:active{filter:brightness(1.2)}
  .btn.minus{font-size:20px;color:var(--muted);width:42px;padding:0}
  .btn.plus{background:var(--surface-2);background:color-mix(in srgb,var(--a) 22%,var(--surface-2));border-color:var(--line);border-color:color-mix(in srgb,var(--a) 45%,transparent);color:var(--text);color:color-mix(in srgb,var(--a) 85%,#fff);padding:0 16px}
  .btn:disabled{opacity:.4;cursor:default}
  .foot{margin-top:26px;display:flex;flex-direction:column;gap:10px}
  .foot-row{display:flex;gap:10px}
  .ghost{flex:1;border:1px solid var(--line);background:transparent;color:var(--muted);font-family:var(--sans);font-weight:600;font-size:13.5px;border-radius:12px;padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
  .ghost:active{background:rgba(255,255,255,.04)}
  .ghost.danger{color:var(--danger);border-color:rgba(200,105,78,.3)}
  .ghost svg{width:15px;height:15px;opacity:.85}
  .save-note{font-size:12px;color:var(--muted-2);text-align:center;line-height:1.6;margin-top:18px;padding:0 6px}
  .save-note b{color:var(--muted)}
  .scrim{position:fixed;inset:0;background:rgba(6,11,9,.66);display:none;align-items:flex-end;justify-content:center;z-index:40;padding:0 10px calc(env(safe-area-inset-bottom) + 10px)}
  .scrim.open{display:flex}
  .sheet{width:100%;max-width:540px;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:20px 18px 18px;max-height:86vh;overflow:auto}
  .sheet h2{font-family:var(--serif);font-weight:500;font-size:21px;margin:0 0 4px}
  .sheet p.hint{color:var(--muted);font-size:13px;margin:0 0 16px}
  .field{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-soft)}
  .field:last-of-type{border-bottom:0}
  .field label{display:flex;align-items:center;gap:10px;font-size:15px}
  .field .fdot{width:10px;height:10px;border-radius:50%}
  .field input{width:96px;text-align:end;font-family:var(--sans);font-weight:600;font-size:15px;color:var(--text);background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .field input:focus{outline:2px solid var(--gold);outline-offset:1px}
  .setall{display:flex;gap:8px;align-items:center;margin:14px 0 4px;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .setall input{width:90px}
  textarea{width:100%;min-height:120px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--text);background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:6px}
  .sheet-actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .primary{flex:1;border:0;background:linear-gradient(180deg,var(--gold-2),var(--gold));color:#1a140a;font-family:var(--sans);font-weight:700;font-size:15px;border-radius:13px;padding:14px;cursor:pointer;min-width:120px}
  .secondary{border:1px solid var(--line);background:transparent;color:var(--muted);font-weight:600;font-size:14px;border-radius:13px;padding:14px 18px;cursor:pointer}
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 22px);transform:translateX(-50%) translateY(20px);background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:11px 18px;border-radius:99px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s ease;z-index:60;box-shadow:0 8px 28px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:6px}
  button:focus:not(:focus-visible){outline:none}
  .topbar{gap:8px;align-items:center}
  .themebtn{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:10px;cursor:pointer;flex:none}
  .themebtn:active{filter:brightness(1.2)}
  .themebtn svg{width:18px;height:18px}
  .themebtn .ic-sun{display:inline-block}
  .themebtn .ic-moon{display:none}
  html[data-theme="light"] .themebtn .ic-sun{display:none}
  html[data-theme="light"] .themebtn .ic-moon{display:inline-block}
  html[data-theme="light"]{--bg:#F2EEE4;--surface:#FFFFFF;--surface-2:#F4EFE4;--line:rgba(45,34,18,.14);--line-soft:rgba(45,34,18,.08);--text:#2A2218;--muted:#6E6456;--muted-2:#9A8F7E;--gold:#C99A45;--gold-2:#DCAE52;--danger:#B0492E;--ok:#4E8C5E}
  html[data-theme="light"] body{background-image:radial-gradient(120% 80% at 50% -20%,rgba(201,154,69,.16),transparent 60%),radial-gradient(90% 60% at 80% 8%,rgba(124,143,201,.10),transparent 55%)}
  html[data-theme="light"] .hero,html[data-theme="light"] .yearbar{background:linear-gradient(180deg,#FFFFFF,#FBF7EE)}
  html[data-theme="light"] .hero::before{background:radial-gradient(80% 120% at 50% -30%,rgba(201,154,69,.14),transparent 60%)}
  html[data-theme="light"] .eyebrow,html[data-theme="light"] .pct{color:#9A6E22}
  html[data-theme="light"] .meter{background:rgba(45,34,18,.08)}
  html[data-theme="light"] .pace .seg,html[data-theme="light"] .savebar,html[data-theme="light"] .badge{background:rgba(45,34,18,.06)}
  html[data-theme="light"] .langwrap select,html[data-theme="light"] .themebtn{background:#FFFFFF}
  html[data-theme="light"] .card{box-shadow:0 1px 3px rgba(45,34,18,.06)}
  html[data-theme="light"] .daybtn{background:linear-gradient(180deg,rgba(201,154,69,.18),rgba(201,154,69,.08));border-color:rgba(201,154,69,.5);color:#8A6320}
  html[data-theme="light"] .btn.plus{background:color-mix(in srgb,var(--a) 16%,#fff);border-color:color-mix(in srgb,var(--a) 40%,transparent);color:color-mix(in srgb,var(--a) 72%,#000)}
  html[data-theme="light"] .card .meter>i{background:color-mix(in srgb,var(--a) 78%,#000)}
  html[data-theme="light"] .ghost:active{background:rgba(45,34,18,.05)}
  html[data-theme="light"] .toast{box-shadow:0 8px 28px rgba(45,34,18,.18)}
</style>
<script>try{var _s=JSON.parse(localStorage.getItem("kazaNamaziV2")||"{}");if(_s&&_s.theme==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}</script>
</head>
<body>
<div class="wrap">
  <div class="topbar"><button class="themebtn" id="themeBtn" aria-label="Tema / Theme"><svg class="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/></svg><svg class="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg></button><div class="langwrap"><select id="langSel" aria-label="Dil / Language"></select></div></div>
  <p class="eyebrow" id="eyebrow">1 yıllık telafi · 5 vakit + vitir</p>
  <h1 data-i18n="h1">Kaza Namazı Takibi</h1>
  <p class="lead" data-i18n="lead">Kıldıkça işaretle, kalanı gör.</p>

  <div class="yearbar">
    <div class="yb-text">
      <div class="yb-label" data-i18n="ybLabel">Telafi süresi</div>
      <div class="yb-sub" data-i18n="ybSub">Kaç yıllık namazı kaza ediyorsun?</div>
    </div>
    <div class="yb-select"><select id="yearSel" aria-label="Yıl"></select></div>
  </div>

  <button class="installbtn" id="installBtn" hidden>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12"/><path d="M8 11l4 4 4-4"/><path d="M5 21h14"/></svg>
    <span data-i18n="installBtn">Ana ekrana ekle</span> <span class="ib-k" data-i18n="installBtnSub">uygulama gibi aç</span>
  </button>

  <section class="hero">
    <div class="savebar" id="savebar"><i></i><span id="saveTxt">Yükleniyor…</span></div>
    <div class="hero-top"><span class="hero-label" data-i18n="heroLabel">Kalan namaz</span><span class="pct" id="pct">%0</span></div>
    <div class="remain"><span class="big" id="remainBig">—</span> <span class="unit" data-i18n="remainUnit">vakit kaldı</span></div>
    <p class="sub" id="subLine"></p>
    <div class="meter"><i id="heroFill"></i></div>
    <div class="pace">
      <span data-i18n="paceLabel">Günde</span>
      <span class="seg" role="group">
        <button data-pace="1" aria-pressed="true">1</button>
        <button data-pace="2" aria-pressed="false">2</button>
        <button data-pace="3" aria-pressed="false">3</button>
      </span>
      <span class="eta" id="eta"></span>
    </div>
  </section>

  <button class="daybtn" id="dayBtn"><span data-i18n="dayBtn">+ Bir gün tamamla</span> <span class="k" data-i18n="dayBtnSub">(5 vakit + vitir)</span></button>

  <div class="seclabel" data-i18n="secPrayers">Namazlar</div>
  <div class="cards" id="cards"></div>

  <div class="foot">
    <div class="foot-row">
      <button class="ghost" id="editBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg><span data-i18n="editBtn">Sayıları düzenle</span></button>
      <button class="ghost" id="backupBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg><span data-i18n="backupBtn">Yedek dosyası</span></button>
    </div>
    <button class="ghost danger" id="resetBtn" data-i18n="resetBtn">Tümünü sıfırla</button>
  </div>

  <p class="save-note" data-i18n-html="saveNote"></p>
</div>

<div class="scrim" id="editScrim"><div class="sheet" role="dialog" aria-modal="true">
  <h2 id="editTitle" data-i18n="editTitle">Sayıları düzenle</h2>
  <p class="hint" data-i18n="editHint"></p>
  <div id="editFields"></div>
  <div class="setall"><span data-i18n="setAllLabel">Tümünü şuna ayarla:</span><input type="number" id="setAllInput" inputmode="numeric" min="0" data-i18n-ph="setAllPh"><button class="secondary" id="setAllBtn" data-i18n="apply" style="padding:9px 14px">Uygula</button></div>

  function detectLang(){ var n=(navigator.language||"tr").slice(0,2).toLowerCase(); for(var i=0;i<LANGS.length;i++){ if(LANGS[i].code===n) return n; } return "tr"; }
  function makeDefault(){ var y=DEFAULT_YEARS; var s={lang:detectLang(),theme:"light",years:y,targets:{},done:{},pace:1,v:3}; PRAYER_IDS.forEach(function(p){ s.targets[p]=y*DPY; s.done[p]=0; }); return s; }
  function merge(base,s){ if(!s) return base; PRAYER_IDS.forEach(function(p){ if(s.targets&&typeof s.targets[p]==="number") base.targets[p]=Math.max(0,Math.floor(s.targets[p])); if(s.done&&typeof s.done[p]==="number") base.done[p]=Math.max(0,Math.floor(s.done[p])); }); if(s.pace) base.pace=s.pace; if(s.lang&&I18N[s.lang]) base.lang=s.lang; if(s.theme==="dark"||s.theme==="light") base.theme=s.theme; if(typeof s.years==="number") base.years=clampYears(s.years); else base.years=clampYears(Math.round((base.targets.sabah||0)/DPY)||DEFAULT_YEARS); return base; }

  var state=makeDefault();

  function tpl(str,obj){ return String(str).replace(/\{(\w+)\}/g,function(_,k){ return obj[k]!=null?obj[k]:""; }); }
  function fmt(n){ var s=String(Math.round(n)); return s.replace(/\B(?=(\d{3})+(?!\d))/g,T.numsep); }
  function pctStr(p){ return T.percentBefore?"%"+p:p+"%"; }
  function fmtDate(d){ try{ return d.toLocaleDateString(LOCALE[state.lang]||"en",{day:"numeric",month:"long",year:"numeric",numberingSystem:"latn",calendar:"gregory"}); }catch(e){ return d.toLocaleDateString(); } }

  PRAYER_IDS.forEach(function(p){
    var c=document.createElement("div"); c.className="card"; c.id="card-"+p; c.style.setProperty("--a",ACCENT[p]);
    c.innerHTML='<div class="card-head"><span class="dot"></span><div class="names"><div class="tr"><span id="nm-'+p+'"></span>'+(p==="vitir"?' <span class="badge" id="vitirBadge"></span>':'')+'</div><div class="ar" id="ar-'+p+'">'+ARABIC[p]+'</div></div><div class="count"><span class="now" id="now-'+p+'">—</span><span class="of"> / <span id="tgt-'+p+'">—</span></span></div></div><div class="meter"><i id="fill-'+p+'"></i></div><div class="row"><span class="left-note" id="note-'+p+'"></span><button class="btn minus" data-act="dec" data-id="'+p+'">−</button><button class="btn plus" data-act="inc" data-id="'+p+'">+1</button><button class="btn plus lg" data-act="inc5" data-id="'+p+'">+5</button></div>';
    cardsEl.appendChild(c);
  });

  var editFields=$("editFields");
  PRAYER_IDS.forEach(function(p){ var row=document.createElement("div"); row.className="field"; row.innerHTML='<label><span class="fdot" style="background:'+ACCENT[p]+'"></span><span id="el-'+p+'"></span></label><input type="number" inputmode="numeric" min="0" id="edit-'+p+'">'; editFields.appendChild(row); });

  (function(){ var h=""; for(var i=0;i<LANGS.length;i++){ h+='<option value="'+LANGS[i].code+'">'+LANGS[i].label+'</option>'; } langSel.innerHTML=h; })();
  function buildYearOptions(){ var h="",u; for(var y=1;y<=MAX_YEARS;y++){ u=(y===1?T.yearU.one:T.yearU.other); h+='<option value="'+y+'">'+y+' '+u+'</option>'; } yearSel.innerHTML=h; yearSel.value=String(state.years); }

  function setStatus(kind){ savebar.className="savebar"; if(kind==="loading") saveTxt.textContent=T.save.loading; else if(kind==="saving"){ savebar.classList.add("saving"); saveTxt.textContent=T.save.saving; } else if(kind==="cloud"){ savebar.classList.add("saved"); saveTxt.textContent=T.save.cloud; } else if(kind==="local"){ savebar.classList.add("saved"); saveTxt.textContent=T.save.local; } else if(kind==="warn"){ savebar.classList.add("warn"); saveTxt.textContent=T.save.warn; } }

  function applyI18n(){
    T=I18N[state.lang]||I18N.tr;
    document.documentElement.setAttribute("lang",state.lang);
    document.documentElement.setAttribute("dir",RTL[state.lang]?"rtl":"ltr");
    document.title=T.htmlTitle;
    var a=document.querySelectorAll("[data-i18n]"),i;
    for(i=0;i<a.length;i++){ var k=a[i].getAttribute("data-i18n"); if(T[k]!=null) a[i].textContent=T[k]; }
    var b=document.querySelectorAll("[data-i18n-html]");
    for(i=0;i<b.length;i++){ var kh=b[i].getAttribute("data-i18n-html"); if(T[kh]!=null) b[i].innerHTML=T[kh]; }
    var c=document.querySelectorAll("[data-i18n-ph]");
    for(i=0;i<c.length;i++){ var kp=c[i].getAttribute("data-i18n-ph"); if(T[kp]!=null) c[i].setAttribute("placeholder",T[kp]); }
    PRAYER_IDS.forEach(function(p,idx){ var nm=$("nm-"+p); if(nm) nm.textContent=T.prayers[idx]; var ar=$("ar-"+p); if(ar) ar.style.display=RTL[state.lang]?"none":""; var el=$("el-"+p); if(el) el.textContent=T.prayers[idx]; });
    var vb=$("vitirBadge"); if(vb) vb.textContent=T.wajib;
    var segs=document.querySelectorAll(".pace .seg button"),s;
    for(s=0;s<segs.length;s++){ var v=parseInt(segs[s].getAttribute("data-pace"),10); segs[s].textContent=v+" "+(v===1?T.dayU.one:T.dayU.other); }
    var il=$("iosList"); if(il) il.innerHTML=T.iosSteps.map(function(x){return "<li>"+x+"</li>";}).join("");
    var al=$("androidList"); if(al) al.innerHTML=T.androidSteps.map(function(x){return "<li>"+x+"</li>";}).join("");
    buildYearOptions();
    langSel.value=state.lang;
    render();
  }

  function render(){
    var done=0,tgt=0,anyRem=0;
    PRAYER_IDS.forEach(function(p){
      var d=state.done[p],t=state.targets[p]; done+=d; tgt+=t;
      var rem=Math.max(0,t-d); if(rem>anyRem) anyRem=rem;
      var pc=t>0?Math.min(100,d/t*100):100;
      var nw=$("now-"+p); if(nw) nw.textContent=fmt(d);
      var tg=$("tgt-"+p); if(tg) tg.textContent=fmt(t);
      var fl=$("fill-"+p); if(fl) fl.style.width=pc+"%";
      var note=$("note-"+p),card=$("card-"+p);
      var dec=card.querySelector('[data-act="dec"]'),inc=card.querySelector('[data-act="inc"]'),inc5=card.querySelector('[data-act="inc5"]');
      if(rem<=0&&t>0){ note.innerHTML=T.completed; note.className="left-note complete"; card.classList.add("done"); inc.disabled=true; inc5.disabled=true; }
      else{ note.innerHTML=tpl(T.remaining,{n:fmt(rem)}); note.className="left-note"; card.classList.remove("done"); inc.disabled=false; inc5.disabled=false; }
      dec.disabled=d<=0;
    });
    var remain=Math.max(0,tgt-done),pct=tgt>0?Math.round(done/tgt*100):0;
    remainBig.textContent=fmt(remain);
    if(subLine) subLine.innerHTML=tpl(T.sub,{done:fmt(done),total:fmt(tgt)});
    pctEl.textContent=pctStr(pct);
    heroFill.style.width=(tgt>0?done/tgt*100:0)+"%";
    if(eyebrowEl) eyebrowEl.textContent=tpl(T.eyebrow,{y:state.years});
    dayBtn.disabled=(anyRem<=0);
    if(remain<=0){ etaEl.textContent=T.allDone; }
    else{ var days=Math.ceil(anyRem/state.pace); var dd=new Date(); dd.setDate(dd.getDate()+days); etaEl.textContent=tpl(T.etaTpl,{days:fmt(days),day:(days===1?T.dayU.one:T.dayU.other),date:fmtDate(dd)}); }
  }

  function bump(id,n){ var t=state.targets[id]; state.done[id]=Math.max(0,Math.min(t,state.done[id]+n)); render(); scheduleSave(); }
  cardsEl.addEventListener("click",function(e){ var b=e.target.closest("button[data-act]"); if(!b) return; var id=b.getAttribute("data-id"),act=b.getAttribute("data-act"); if(act==="inc")bump(id,1); else if(act==="inc5")bump(id,5); else if(act==="dec")bump(id,-1); });
  dayBtn.addEventListener("click",function(){ var ch=false; PRAYER_IDS.forEach(function(p){ if(state.done[p]<state.targets[p]){ state.done[p]++; ch=true; } }); if(ch){ render(); scheduleSave(); toast(T.tDayAdded); } });

  document.querySelectorAll(".pace .seg button").forEach(function(btn){ btn.addEventListener("click",function(){ document.querySelectorAll(".pace .seg button").forEach(function(x){x.setAttribute("aria-pressed","false");}); btn.setAttribute("aria-pressed","true"); state.pace=parseInt(btn.getAttribute("data-pace"),10); render(); scheduleSave(); }); });
  function syncPaceUI(){ document.querySelectorAll(".pace .seg button").forEach(function(btn){ btn.setAttribute("aria-pressed",parseInt(btn.getAttribute("data-pace"),10)===state.pace?"true":"false"); }); }

  yearSel.addEventListener("change",function(){ var y=clampYears(parseInt(yearSel.value,10)); state.years=y; PRAYER_IDS.forEach(function(p){ state.targets[p]=y*DPY; if(state.done[p]>state.targets[p]) state.done[p]=state.targets[p]; }); render(); scheduleSave(); toast(tpl(T.tYearSet,{y:y,yr:(y===1?T.yearU.one:T.yearU.other),n:fmt(y*DPY)})); });
  langSel.addEventListener("change",function(){ var l=langSel.value; if(I18N[l]){ state.lang=l; applyI18n(); scheduleSave(); } });
  var themeBtn=$("themeBtn");
  function applyTheme(){ document.documentElement.setAttribute("data-theme", state.theme==="dark"?"dark":"light"); }
  if(themeBtn){ themeBtn.addEventListener("click",function(){ state.theme=(state.theme==="dark"?"light":"dark"); applyTheme(); scheduleSave(); }); }

  var toastT; function toast(m){ toastEl.textContent=m; toastEl.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove("show");},1700); }
  function openSheet(el){ el.classList.add("open"); } function closeSheet(el){ el.classList.remove("open"); }
  document.querySelectorAll(".scrim").forEach(function(sc){ sc.addEventListener("click",function(e){ if(e.target===sc||e.target.hasAttribute("data-close")) closeSheet(sc); }); });

  var editScrim=$("editScrim");
  $("editBtn").addEventListener("click",function(){ PRAYER_IDS.forEach(function(p){ $("edit-"+p).value=state.targets[p]; }); $("setAllInput").value=""; openSheet(editScrim); });
  $("setAllBtn").addEventListener("click",function(){ var v=parseInt($("setAllInput").value,10); if(isNaN(v)||v<0){ toast(T.tInvalidNum); return; } PRAYER_IDS.forEach(function(p){ $("edit-"+p).value=v; }); });
  $("editSave").addEventListener("click",function(){ PRAYER_IDS.forEach(function(p){ var v=parseInt($("edit-"+p).value,10); if(isNaN(v)||v<0)v=0; state.targets[p]=v; if(state.done[p]>v) state.done[p]=v; }); render(); scheduleSave(); closeSheet(editScrim); toast(T.tSaved); });

  var backupScrim=$("backupScrim");
  $("backupBtn").addEventListener("click",function(){ $("bkText").value=JSON.stringify(state); openSheet(backupScrim); });
  $("bkCopy").addEventListener("click",function(){ var ta=$("bkText"); ta.select(); try{ if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).then(function(){toast(T.tCopied);}); } else { document.execCommand("copy"); toast(T.tCopied); } }catch(e){ try{document.execCommand("copy");}catch(_){} toast(T.tCopied); } });
  $("bkDownload").addEventListener("click",function(){ try{ var blob=new Blob([$("bkText").value],{type:"application/json"}); var url=URL.createObjectURL(blob); var a=document.createElement("a"); a.href=url; a.download="kaza-namazi-yedek-"+new Date().toISOString().slice(0,10)+".json"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); toast(T.tDownloading); }catch(e){ toast(T.tDownloadFail); } });
  $("bkRestore").addEventListener("click",function(){ try{ var s=JSON.parse($("bkText").value); if(!s||!s.targets||!s.done) throw 0; state=merge(makeDefault(),s); applyI18n(); syncPaceUI(); scheduleSave(); closeSheet(backupScrim); toast(T.tRestored); }catch(e){ toast(T.tReadFail); } });

  $("resetBtn").addEventListener("click",function(){ if(confirm(T.resetConfirm)){ PRAYER_IDS.forEach(function(p){ state.done[p]=0; }); render(); scheduleSave(); toast(T.tReset); } });

  var installBtn=$("installBtn"),installScrim=$("installScrim"),deferredPrompt=null;
  function isStandalone(){ return (window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone===true; }
  function isIOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1); }
  function showInstall(){ if(installBtn) installBtn.hidden=isStandalone(); }
  window.addEventListener("beforeinstallprompt",function(e){ e.preventDefault(); deferredPrompt=e; showInstall(); });
  window.addEventListener("appinstalled",function(){ deferredPrompt=null; if(installBtn) installBtn.hidden=true; toast(T.tInstalled); });
  function openInstallHelp(){ var ios=isIOS(); $("iosSteps").hidden=!ios; $("androidSteps").hidden=ios; var ua=navigator.userAgent||""; var inApp=/FBAN|FBAV|Instagram|Line\/|Twitter|WhatsApp|; wv\)/i.test(ua); $("inappNote").hidden=!inApp; openSheet(installScrim); }
  if(installBtn){ installBtn.addEventListener("click",function(){ if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.then(function(c){ deferredPrompt=null; if(c&&c.outcome==="accepted"&&installBtn) installBtn.hidden=true; }); } else { openInstallHelp(); } }); }

  var hasCloud=(typeof window!=="undefined")&&window.storage&&typeof window.storage.get==="function";
  function localMirror(){ try{ localStorage.setItem(LOCAL_KEY,JSON.stringify(state)); }catch(e){} }
  function localOk(){ try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }catch(e){ return false; } }
  var cloudTimer=null;
  function scheduleSave(){ localMirror(); setStatus("saving"); if(cloudTimer) clearTimeout(cloudTimer); cloudTimer=setTimeout(flushSave,450); }
  function flushSave(){ if(cloudTimer){ clearTimeout(cloudTimer); cloudTimer=null; } if(hasCloud){ try{ Promise.resolve(window.storage.set(STORE_KEY,JSON.stringify(state))).then(function(){ setStatus("cloud"); }).catch(function(){ setStatus(localOk()?"local":"warn"); }); }catch(e){ setStatus(localOk()?"local":"warn"); } } else { setStatus(localOk()?"local":"warn"); } }
  document.addEventListener("visibilitychange",function(){ if(document.visibilityState==="hidden") flushSave(); });
  window.addEventListener("pagehide",flushSave);
  function localLoad(base){ try{ var raw=localStorage.getItem(LOCAL_KEY); if(raw) return merge(base,JSON.parse(raw)); }catch(e){} return base; }
  function loadState(){ var base=makeDefault(); return new Promise(function(resolve){ if(hasCloud){ try{ Promise.resolve(window.storage.get(STORE_KEY)).then(function(res){ resolve(res&&res.value?merge(base,JSON.parse(res.value)):localLoad(base)); }).catch(function(){ resolve(localLoad(base)); }); }catch(e){ resolve(localLoad(base)); } } else { resolve(localLoad(base)); } }); }

  function ensurePersist(){ try{ if(navigator.storage&&navigator.storage.persist){ if(navigator.storage.persisted){ navigator.storage.persisted().then(function(p){ if(!p){ try{navigator.storage.persist();}catch(_){} } }).catch(function(){ try{navigator.storage.persist();}catch(_){} }); } else { try{navigator.storage.persist();}catch(_){} } } }catch(e){} }
  ensurePersist();
  window.addEventListener("pointerdown",ensurePersist,{once:true});

  setStatus("loading");
  loadState().then(function(s){ state=s; applyTheme(); applyI18n(); syncPaceUI(); showInstall(); setStatus(hasCloud?"cloud":(localOk()?"local":"warn")); });
})();
</script>
